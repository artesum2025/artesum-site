<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArteSUM</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow-x: hidden; }
        .container { position: relative; width: 100%; } /* 너비를 100%로 설정 */
        img { width: 100%; height: auto; display: block; border: none; }

        /* 클릭 가능한 투명 버튼 (Start 버튼 위치에 맞게 조절) */
        .start-btn {
            position: absolute;
            bottom: 12%;      /* 이미지 하단에서의 높이 (필요시 조절) */
            left: 50%;
            transform: translateX(-50%);
            width: 15%;       /* 버튼 가로 크기 */
            height: 6%;       /* 버튼 세로 크기 */
            background-color: rgba(255, 255, 255, 0); 
            cursor: pointer;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="main-image.png.png" alt="Main Page">
        <a href="next.html" class="start-btn"></a>
    </div>
</body>
</html>
