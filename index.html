<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArteSUM - Atelier</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f8f8f8; overflow-x: hidden; }
        .container { width: 100%; display: flex; flex-direction: column; align-items: center; position: relative; }

        /* 상단 슬라이드 영역 */
        .slideshow { position: relative; width: 100%; display: block; line-height: 0; }
        .slideshow img { width: 100%; height: auto; display: block; transition: opacity 1.5s ease-in-out; }
        .slideshow img:not(:first-child) { position: absolute; top: 0; left: 0; opacity: 0; }
        .slideshow img.active { opacity: 1; }

        /* 하단 본문 이미지 영역 */
        .body-container { position: relative; width: 100%; }
        .body-img { width: 100%; height: auto; display: block; border: none; }

        /* [추가] '아뜰리에 시작하기' 버튼 클릭 영역 (투명) */
        .start-btn {
            position: absolute;
            /* 이미지 맨 아래에서 약 8.2% 정도 위쪽 (보내주신 이미지 기준) */
            bottom: 8.2%;      
            left: 50%;
            transform: translateX(-50%);
            /* 버튼 크기에 맞게 넉넉히 설정 */
            width: 350px; 
            height: 100px;
            background-color: rgba(255, 255, 255, 0); 
            cursor: pointer;
            z-index: 1000;
            /* 위치 확인용 빨간 테두리 (잘 눌리면 아래 줄을 지우세요!) */
             border: 2px solid red;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 상단 슬라이드 부분 -->
        <div class="slideshow" id="slideshow">
            <img src="top1.png.png" class="active" alt="상단 1">
            <img src="top2.png.png" alt="상단 2">
        </div>

        <!-- 하단 본문 이미지 부분 -->
        <div class="body-container">
            <img src="main-body.png.png" alt="본문 내용" class="body-img">
            
            <!-- [추가] 이 영역을 누르면 next.html로 이동합니다 -->
            <a href="next.html" class="start-btn"></a>
        </div>
    </div>

    <script>
        const images = document.querySelectorAll('#slideshow img');
        let currentIndex = 0;

        function showNextImage() {
            images.forEach(img => img.classList.remove('active'));
            currentIndex = (currentIndex + 1) % images.length;
            images[currentIndex].classList.add('active');
        }

        setInterval(showNextImage, 5000);
    </script>
</body>
</html>
