<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArteSUM - Atelier</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f8f8f8; overflow-x: hidden; }
        .container { width: 100%; display: flex; flex-direction: column; align-items: center; }

        /* 1. 슬라이드 영역 (이미지가 겹쳐서 나타나게 설정) */
        .slideshow { position: relative; width: 100%; height: 0; padding-bottom: 56.25%; /* 이미지 비율에 맞춰 조절 가능 */ overflow: hidden; }
        .slideshow img { position: absolute; top: 0; left: 0; width: 100%; height: auto; opacity: 0; transition: opacity 1.5s ease-in-out; }
        
        /* 첫 번째 이미지가 먼저 보이게 설정 */
        .slideshow img.active { opacity: 1; }

        /* 2. 하단 본문 이미지 */
        .body-img { width: 100%; height: auto; display: block; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 상단 슬라이드 부분 -->
        <div class="slideshow" id="slideshow">
            <img src="top1.png.png" class="active" alt="상단 1">
            <img src="top2.png.png" alt="상단 2">
        </div>

        <!-- 하단 본문 이미지 -->
        <img src="main-body.png.png" alt="본문 내용" class="body-img">
    </div>

    <script>
        // 5초마다 이미지를 교체하는 간단한 코드
        const images = document.querySelectorAll('#slideshow img');
        let currentIndex = 0;

        function showNextImage() {
            images[currentIndex].classList.remove('active'); // 현재 이미지 숨기기
            currentIndex = (currentIndex + 1) % images.length; // 다음 이미지 번호 계산
            images[currentIndex].classList.add('active'); // 다음 이미지 보이기
        }

        // 5000ms = 5초마다 실행
        setInterval(showNextImage, 5000);
    </script>
</body>
</html>
