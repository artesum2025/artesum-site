<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArteSUM - Atelier</title>
    
    <!-- 슬라이드 도구 (CSS) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net" />
    
    <style>
        /* 기본 여백 제거 */
        body { margin: 0; padding: 0; background-color: #f8f8f8; overflow-x: hidden; }
        .container { width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        /* 슬라이드 영역: 이미지가 아래로 나열되지 않게 고정 */
        .swiper { width: 100%; height: auto; overflow: hidden; }
        .swiper-slide img { width: 100%; height: auto; display: block; }
        
        /* 본문 이미지 */
        .body-img { width: 100%; height: auto; display: block; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 상단 슬라이드 부분 -->
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="top1.png.png" alt="상단 1"></div>
                <div class="swiper-slide"><img src="top2.png.png" alt="상단 2"></div>
            </div>
        </div>

        <!-- 하단 본문 이미지 -->
        <img src="main-body.png.png" alt="본문 내용" class="body-img">
    </div>

    <!-- 슬라이드 도구 (JS) - 반드시 바디 끝부분에 위치해야 합니다 -->
    <script src="https://cdn.jsdelivr.net"></script>

    <script>
        // 페이지가 완전히 로드된 후 슬라이드를 실행합니다
        window.onload = function() {
            const swiper = new Swiper('.mySwiper', {
                loop: true,
                autoplay: {
                    delay: 5000,
                    disableOnInteraction: false,
                },
                speed: 1000,
            });
        };
    </script>
</body>
</html>
